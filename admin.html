<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>木偶鱼 - 管理后台</title>
  <script src="https://static.cloudbase.net/cloudbase-js-sdk/latest/cloudbase.full.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/spark-md5@3.0.2/spark-md5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    
    .header { background: #fff; padding: 20px; border-radius: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 20px; color: #333; }
    .user-info { display: flex; align-items: center; gap: 10px; }
    .user-info span { color: #666; font-size: 14px; }
    .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
    .btn-primary { background: #667eea; color: #fff; }
    .btn-danger { background: #ff6b6b; color: #fff; }
    .btn-success { background: #52c41a; color: #fff; }
    .btn:hover { opacity: 0.9; }
    
    .login-box { text-align: center; padding: 60px 20px; background: #fff; border-radius: 12px; }
    .login-box h2 { margin-bottom: 20px; color: #333; }
    .login-box p { color: #666; margin-bottom: 30px; }
    #qrcode { display: inline-block; padding: 20px; background: #fff; border: 1px solid #eee; border-radius: 8px; }
    #qrcode img { display: block; }
    
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .tab { padding: 12px 24px; background: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; color: #666; }
    .tab.active { background: #667eea; color: #fff; }
    
    .upload-area { background: #fff; border-radius: 12px; padding: 30px; margin-bottom: 20px; }
    .drop-zone { border: 2px dashed #ddd; border-radius: 12px; padding: 60px 20px; text-align: center; cursor: pointer; transition: all 0.3s; }
    .drop-zone:hover, .drop-zone.dragover { border-color: #667eea; background: #f8f9ff; }
    .drop-zone-icon { font-size: 48px; margin-bottom: 10px; }
    .drop-zone-text { color: #666; }
    .drop-zone-hint { color: #999; font-size: 12px; margin-top: 8px; }
    
    .preview-list { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; }
    .preview-item { position: relative; width: 100px; height: 100px; border-radius: 8px; overflow: hidden; }
    .preview-item img { width: 100%; height: 100%; object-fit: cover; }
    .preview-item .remove { position: absolute; top: 4px; right: 4px; width: 20px; height: 20px; background: rgba(0,0,0,0.5); color: #fff; border: none; border-radius: 50%; cursor: pointer; font-size: 12px; }
    .preview-item .status { position: absolute; bottom: 0; left: 0; right: 0; padding: 2px; font-size: 10px; text-align: center; color: #fff; }
    .preview-item .status.success { background: #52c41a; }
    .preview-item .status.error { background: #ff6b6b; }
    .preview-item .status.duplicate { background: #faad14; }
    
    .upload-actions { margin-top: 20px; display: flex; gap: 10px; }
    
    .image-list { background: #fff; border-radius: 12px; padding: 20px; }
    .image-list h3 { margin-bottom: 15px; color: #333; font-size: 16px; }
    .list-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #eee; }
    .list-item:last-child { border-bottom: none; }
    .list-item img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; margin-right: 15px; }
    .list-item .info { flex: 1; }
    .list-item .info .time { font-size: 12px; color: #999; }
    .list-item .actions { display: flex; gap: 10px; }
    .list-item .checkbox { margin-right: 10px; }
    .list-item .checkbox input { width: 18px; height: 18px; cursor: pointer; }
    
    .batch-actions { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; }
    .batch-actions .selected-count { color: #666; font-size: 14px; }
    
    .empty { text-align: center; padding: 40px; color: #999; }
    
    .loading { text-align: center; padding: 20px; color: #666; }
    
    .stats { display: flex; gap: 20px; margin-bottom: 20px; }
    .stat-card { background: #fff; padding: 20px; border-radius: 12px; flex: 1; text-align: center; }
    .stat-card .num { font-size: 32px; font-weight: bold; color: #667eea; }
    .stat-card .label { font-size: 14px; color: #666; margin-top: 5px; }
    
    .hidden { display: none !important; }
    
    /* 图片预览模态框 */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.9);
    }
    .modal-content {
      margin: auto;
      display: block;
      max-width: 90%;
      max-height: 80%;
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .modal-close {
      position: absolute;
      top: 20px;
      right: 30px;
      color: #fff;
      font-size: 40px;
      font-weight: bold;
      cursor: pointer;
      z-index: 1001;
    }
    .modal-close:hover {
      color: #ccc;
    }
    .modal-info {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 14px;
      text-align: center;
    }
    .modal-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: #fff;
      font-size: 50px;
      font-weight: bold;
      cursor: pointer;
      user-select: none;
      padding: 20px;
      z-index: 1001;
      transition: opacity 0.2s;
    }
    .modal-nav:hover {
      opacity: 0.7;
    }
    .modal-prev {
      left: 20px;
    }
    .modal-next {
      right: 20px;
    }
    .modal-actions {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
    }
    .modal-actions .btn {
      padding: 8px 20px;
    }
  </style>
</head>
<body>
  <!-- 图片预览模态框 -->
  <div id="imageModal" class="modal">
    <span class="modal-close" onclick="closeModal()">&times;</span>
    <span class="modal-nav modal-prev" onclick="prevImage()">&#10094;</span>
    <span class="modal-nav modal-next" onclick="nextImage()">&#10095;</span>
    <div class="modal-actions" id="modalActions"></div>
    <img class="modal-content" id="modalImage">
    <div class="modal-info" id="modalInfo"></div>
  </div>
  
  <div class="container">
    <div class="header">
      <h1>木偶鱼 - 管理后台</h1>
      <div class="user-info">
        <span id="username"></span>
        <button class="btn btn-danger hidden" id="logoutBtn" onclick="logout()">退出</button>
      </div>
    </div>
    
    <div id="loginSection" class="login-box">
      <h2>微信扫码登录</h2>
      <p>请使用微信扫描二维码登录</p>
      <div id="qrcode"></div>
    </div>
    
    <div id="mainSection" class="hidden">
      <div class="month-selector" style="margin-bottom: 20px; display: none;">
        <button class="btn" onclick="changeMonth(-1)">← 上个月</button>
        <span id="currentMonth" style="font-size: 18px; font-weight: bold; color: #333;"></span>
        <button class="btn" onclick="changeMonth(1)">下个月 →</button>
      </div>
      
      <div class="stats">
        <div class="stat-card">
          <div class="num" id="pendingCount">0</div>
          <div class="label">待审核</div>
        </div>
        <div class="stat-card">
          <div class="num" id="passedCount">0</div>
          <div class="label">已通过</div>
        </div>
        <div class="stat-card">
          <div class="num" id="rejectedCount">0</div>
          <div class="label">已拒绝</div>
        </div>
      </div>
      
      <div class="tabs">
        <button class="tab active" onclick="switchTab('upload')">批量上传</button>
        <button class="tab" onclick="switchTab('pending')">待审核</button>
        <button class="tab" onclick="switchTab('passed')">已通过</button>
        <button class="tab" onclick="switchTab('rejected')">已拒绝</button>
      </div>
      
      <div id="uploadTab">
        <div class="upload-area">
          <div class="drop-zone" id="dropZone">
            <div class="drop-zone-icon">📁</div>
            <div class="drop-zone-text">拖拽图片到这里，或点击选择图片</div>
            <div class="drop-zone-hint">支持批量上传，无数量限制</div>
          </div>
          <input type="file" id="fileInput" multiple accept="image/*" style="display:none">
          <div class="preview-list" id="previewList"></div>
          <div class="upload-actions hidden" id="uploadActions">
            <button class="btn btn-primary" onclick="startUpload()">开始上传</button>
            <button class="btn" onclick="clearPreview()">清空列表</button>
          </div>
        </div>
      </div>
      
      <div id="pendingTab" class="hidden">
        <div class="image-list">
          <h3>待审核图片</h3>
          <div id="pendingList"></div>
        </div>
      </div>
      
      <div id="passedTab" class="hidden">
        <div class="image-list">
          <h3>已通过图片</h3>
          <div id="passedList"></div>
        </div>
      </div>
      
      <div id="rejectedTab" class="hidden">
        <div class="image-list">
          <h3>已拒绝图片</h3>
          <div id="rejectedList"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const ENV_ID = 'cloudbase-8gfl3w4b18e46282';
    const DEVELOPER_OPENIDS = ['oWatD3bwu0aVaFTPvrrerAU_C2zY'];
    
    let app = null;
    let db = null;
    let currentUser = null;
    let selectedFiles = [];
    let currentYearMonth = null;
    let previewImages = [];
    let previewIndex = 0;
    
    // 将 cloud:// URL 转换为 https:// URL
    function transformCloudUrl(cloudUrl) {
      const regex = /^(cloud):\/\/([0-9\-A-Za-z]+)?\.([0-9\-A-Za-z]+)\/(.*)/;
      const matched = cloudUrl.match(regex);
      if (matched) {
        const [_, protocol, envid, origin, path] = matched;
        if (protocol === 'cloud') {
          return `https://${origin}.tcb.qcloud.la/${path}`;
        }
      }
      return null;
    }
    
    async function init() {
      try {
        // 1. 初始化 app
        app = cloudbase.init({ 
          env: ENV_ID,
          region: 'ap-shanghai'
        });
        
        // 2. 获取 auth 模块并进行匿名登录
        const auth = app.auth();
        const loginState = await auth.getLoginState();
        
        // 3. 如果未登录，进行匿名登录
        if (!loginState) {
          console.log('未登录，开始匿名登录...');
          await auth.signInAnonymously();
          console.log('匿名登录成功');
        } else {
          console.log('已登录，登录状态:', loginState);
        }
        
        // 4. 获取数据库引用（登录成功后）
        db = app.database();
        
        // 5. 检查是否有保存的 openid
        const savedOpenid = window.localStorage.getItem('admin_openid');
        if (savedOpenid && DEVELOPER_OPENIDS.includes(savedOpenid)) {
          currentUser = { openid: savedOpenid };
          showMain();
        } else {
          showLogin();
        }
      } catch (err) {
        console.error('初始化失败', err);
        document.getElementById('qrcode').innerHTML = `
          <p style="color:red">初始化失败: ${err.message}</p>
          <p style="color:#666;margin-top:15px;font-size:14px">
            请确保已在云开发控制台开启以下权限：<br>
            1. 未登录用户访问云资源权限<br>
            2. 允许匿名登入<br>
            <br>
            <a href="https://console.cloud.tencent.com/tcb/env/setting?envId=${ENV_ID}" 
               target="_blank" style="color:#667eea">点击前往云开发控制台设置</a>
          </p>
          <button onclick="location.reload()" 
                  style="margin-top:15px;padding:10px 20px;background:#667eea;color:#fff;border:none;border-radius:6px;cursor:pointer">
            重试
          </button>
        `;
      }
    }
    
    function showLogin() {
      document.getElementById('loginSection').classList.remove('hidden');
      document.getElementById('mainSection').classList.add('hidden');
      
      document.getElementById('qrcode').innerHTML = `
        <div style="text-align:left;max-width:300px">
          <p style="margin-bottom:15px;color:#666">请先在小程序中获取登录凭证：</p>
          <ol style="color:#666;line-height:2;padding-left:20px">
            <li>打开小程序</li>
            <li>连续点击5次"热爱可抵漫长岁月"</li>
            <li>复制显示的openid</li>
          </ol>
          <input type="text" id="openidInput" placeholder="粘贴你的openid" 
            style="width:100%;padding:10px;margin-top:15px;border:1px solid #ddd;border-radius:6px">
          <button onclick="loginWithOpenid()" 
            style="width:100%;padding:10px;margin-top:10px;background:#667eea;color:#fff;border:none;border-radius:6px;cursor:pointer">
            登录
          </button>
        </div>
      `;
    }
    
    function loginWithOpenid() {
      const openid = document.getElementById('openidInput').value.trim();
      if (!openid) {
        alert('请输入openid');
        return;
      }
      
      if (!DEVELOPER_OPENIDS.includes(openid)) {
        alert('无权限访问管理后台');
        return;
      }
      
      currentUser = { openid };
      window.localStorage.setItem('admin_openid', openid);
      showMain();
    }
    
    function showMain() {
      document.getElementById('loginSection').classList.add('hidden');
      document.getElementById('mainSection').classList.remove('hidden');
      document.getElementById('username').textContent = '开发者';
      document.getElementById('logoutBtn').classList.remove('hidden');
      
      // 初始化月份选择器为当前月份
      const now = new Date();
      currentYearMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
      updateMonthSelector();
      
      loadStats();
      loadImages(0);
      setupDropZone();
    }
    
    function logout() {
      window.localStorage.removeItem('admin_openid');
      location.reload();
    }
    
    async function loadStats() {
      try {
        const [pending, passed, rejected] = await Promise.all([
          db.collection('images').where({ status: 0 }).count(),
          db.collection('images').where({ status: 1 }).count(),
          db.collection('images').where({ status: 2 }).count()
        ]);
        document.getElementById('pendingCount').textContent = pending.total;
        document.getElementById('passedCount').textContent = passed.total;
        document.getElementById('rejectedCount').textContent = rejected.total;
      } catch (err) {
        console.error('加载统计失败', err);
      }
    }
    
    async function loadImages(status) {
      const listId = ['pendingList', 'passedList', 'rejectedList'][status];
      const listEl = document.getElementById(listId);
      listEl.innerHTML = '<div class="loading">加载中...</div>';
      
      try {
        const res = await db.collection('images')
          .where({ status })
          .orderBy('createTime', 'desc')
          .limit(50)
          .get();
        
        if (res.data.length === 0) {
          listEl.innerHTML = '<div class="empty">暂无内容</div>';
          return;
        }
        
        const fileIDs = res.data.map(item => item.url).filter(url => url);
        let urlMap = {};
        
        if (fileIDs.length > 0) {
          try {
            console.log('获取临时 URL，文件数量:', fileIDs.length);
            
            // 使用云函数获取临时 URL
            const tempUrlResult = await app.callFunction({
              name: 'getTempUrls',
              data: { fileIDs }
            });
            
            console.log('云函数返回:', tempUrlResult);
            
            if (tempUrlResult.result && tempUrlResult.result.success) {
              urlMap = tempUrlResult.result.urlMap;
              console.log('URL 映射表:', urlMap);
            } else {
              console.error('云函数返回失败:', tempUrlResult.result);
              // 如果云函数失败，尝试使用正则转换
              fileIDs.forEach(fileID => {
                const httpsUrl = transformCloudUrl(fileID);
                if (httpsUrl) {
                  urlMap[fileID] = httpsUrl;
                }
              });
            }
          } catch (err) {
            console.error('获取临时链接失败', err);
            // 如果获取失败，尝试使用正则转换所有 URL
            fileIDs.forEach(fileID => {
              const httpsUrl = transformCloudUrl(fileID);
              if (httpsUrl) {
                urlMap[fileID] = httpsUrl;
              }
            });
          }
        }
        
        console.log('最终 URL 映射表:', urlMap);
        
        previewImages = res.data.map(item => ({
          id: item._id,
          url: urlMap[item.url] || item.url,
          status: status,
          likeCount: item.likeCount || 0,
          dislikeCount: item.dislikeCount || 0,
          createTime: item.createTime
        }));
        
        listEl.innerHTML = `
          <div class="batch-actions">
            <label><input type="checkbox" onchange="toggleSelectAll(this, ${status})"> 全选</label>
            <button class="btn btn-danger" onclick="batchDelete(${status})">批量删除</button>
            <span class="selected-count" id="selectedCount-${status}">已选择 0 张</span>
          </div>
          <div class="image-grid">
            ${res.data.map((item, index) => `
              <div class="list-item" data-id="${item._id}" data-status="${status}">
                <div class="checkbox">
                  <input type="checkbox" class="image-checkbox" data-id="${item._id}" data-status="${status}" onchange="updateSelectedCount(${status})">
                </div>
                <img src="${urlMap[item.url] || item.url}" onclick="previewImage(${index}, ${status})" style="cursor:pointer">
                <div class="info">
                  <div class="time">${formatTime(item.createTime)}</div>
                  <div style="margin-top:5px;color:#666;font-size:12px">🌸 ${item.likeCount || 0} | 💩 ${item.dislikeCount || 0}</div>
                </div>
                ${status === 0 ? `
                  <div class="actions">
                    <button class="btn btn-success" onclick="reviewImage('${item._id}', 1)">通过</button>
                    <button class="btn btn-danger" onclick="reviewImage('${item._id}', 2)">拒绝</button>
                  </div>
                ` : `
                  <button class="btn btn-danger" onclick="deleteImage('${item._id}', ${status})">删除</button>
                `}
              </div>
            `).join('')}
          </div>
        `;
      } catch (err) {
        console.error('加载图片失败', err);
        listEl.innerHTML = '<div class="empty">加载失败</div>';
      }
    }
    
    function toggleSelectAll(checkbox, status) {
      const checkboxes = document.querySelectorAll(`.image-checkbox[data-status="${status}"]`);
      checkboxes.forEach(cb => cb.checked = checkbox.checked);
      updateSelectedCount(status);
    }
    
    function updateSelectedCount(status) {
      const checkboxes = document.querySelectorAll(`.image-checkbox[data-status="${status}"]:checked`);
      const countEl = document.getElementById(`selectedCount-${status}`);
      if (countEl) {
        countEl.textContent = `已选择 ${checkboxes.length} 张`;
      }
    }
    
    async function deleteImage(imageId, status) {
      if (!confirm('确定要删除这张图片吗？')) return;
      
      try {
        const result = await app.callFunction({
          name: 'deleteImages',
          data: {
            action: 'batchDelete',
            imageIds: [imageId]
          }
        });
        
        if (result.result && result.result.success) {
          loadImages(status);
          loadStats();
          alert('删除成功');
        } else {
          alert('删除失败：' + (result.result?.message || '未知错误'));
        }
      } catch (err) {
        console.error('删除失败', err);
        alert('删除失败：' + err.message);
      }
    }
    
    async function batchDelete(status) {
      const checkboxes = document.querySelectorAll(`.image-checkbox[data-status="${status}"]:checked`);
      if (checkboxes.length === 0) {
        alert('请先选择要删除的图片');
        return;
      }
      
      if (!confirm(`确定要删除选中的 ${checkboxes.length} 张图片吗？`)) return;
      
      const ids = Array.from(checkboxes).map(cb => cb.dataset.id);
      
      try {
        const result = await app.callFunction({
          name: 'deleteImages',
          data: {
            action: 'batchDelete',
            imageIds: ids
          }
        });
        
        if (result.result && result.result.success) {
          alert(`删除完成\n成功: ${result.result.successCount}\n失败: ${result.result.failCount}`);
          loadImages(status);
          loadStats();
        } else {
          alert('删除失败：' + (result.result?.message || '未知错误'));
        }
      } catch (err) {
        console.error('批量删除失败', err);
        alert('删除失败：' + err.message);
      }
    }
    
    function formatTime(timestamp) {
      const d = new Date(timestamp);
      return `${d.getMonth() + 1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2, '0')}`;
    }
    
    async function reviewImage(imageId, status) {
      try {
        await app.callFunction({
          name: 'admin',
          data: { action: 'review', imageId, status, adminOpenid: currentUser.openid }
        });
        loadImages(0);
        loadStats();
      } catch (err) {
        alert('操作失败：' + err.message);
      }
    }
    
    function previewImage(index, status) {
      previewIndex = index;
      updatePreviewModal();
    }
    
    function updatePreviewModal() {
      const modal = document.getElementById('imageModal');
      const modalImg = document.getElementById('modalImage');
      const modalInfo = document.getElementById('modalInfo');
      const modalActions = document.getElementById('modalActions');
      
      const current = previewImages[previewIndex];
      if (!current) return;
      
      modalImg.src = current.url;
      modalInfo.textContent = `${previewIndex + 1} / ${previewImages.length} | 🌸 ${current.likeCount} | 💩 ${current.dislikeCount}`;
      
      let actionsHtml = '';
      if (current.status === 0) {
        actionsHtml = `
          <button class="btn btn-success" onclick="reviewFromPreview(1)">通过</button>
          <button class="btn btn-danger" onclick="reviewFromPreview(2)">拒绝</button>
        `;
      } else {
        actionsHtml = `<button class="btn btn-danger" onclick="deleteFromPreview()">删除</button>`;
      }
      modalActions.innerHTML = actionsHtml;
      
      modal.style.display = 'block';
    }
    
    function prevImage() {
      if (previewIndex > 0) {
        previewIndex--;
        updatePreviewModal();
      }
    }
    
    function nextImage() {
      if (previewIndex < previewImages.length - 1) {
        previewIndex++;
        updatePreviewModal();
      }
    }
    
    async function reviewFromPreview(newStatus) {
      const current = previewImages[previewIndex];
      if (!current) return;
      
      try {
        await app.callFunction({
          name: 'admin',
          data: { action: 'review', imageId: current.id, status: newStatus, adminOpenid: currentUser.openid }
        });
        
        previewImages.splice(previewIndex, 1);
        
        if (previewImages.length === 0) {
          closeModal();
          loadImages(0);
          loadStats();
        } else {
          if (previewIndex >= previewImages.length) {
            previewIndex = previewImages.length - 1;
          }
          updatePreviewModal();
          loadImages(0);
          loadStats();
        }
      } catch (err) {
        alert('操作失败：' + err.message);
      }
    }
    
    async function deleteFromPreview() {
      const current = previewImages[previewIndex];
      if (!current) return;
      
      if (!confirm('确定要删除这张图片吗？')) return;
      
      try {
        const result = await app.callFunction({
          name: 'deleteImages',
          data: {
            action: 'batchDelete',
            imageIds: [current.id]
          }
        });
        
        if (result.result && result.result.success) {
          previewImages.splice(previewIndex, 1);
          
          if (previewImages.length === 0) {
            closeModal();
            loadImages(current.status);
            loadStats();
          } else {
            if (previewIndex >= previewImages.length) {
              previewIndex = previewImages.length - 1;
            }
            updatePreviewModal();
            loadImages(current.status);
            loadStats();
          }
        } else {
          alert('删除失败：' + (result.result?.message || '未知错误'));
        }
      } catch (err) {
        console.error('删除失败', err);
        alert('删除失败：' + err.message);
      }
    }
    
    function closeModal(event) {
      if (event && event.target.tagName === 'IMG') return;
      const modal = document.getElementById('imageModal');
      modal.style.display = 'none';
    }
    
    document.addEventListener('keydown', (e) => {
      const modal = document.getElementById('imageModal');
      if (modal.style.display !== 'block') return;
      
      if (e.key === 'ArrowLeft') {
        prevImage();
      } else if (e.key === 'ArrowRight') {
        nextImage();
      } else if (e.key === 'Escape') {
        closeModal();
      }
    });
    
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      
      document.getElementById('uploadTab').classList.add('hidden');
      document.getElementById('pendingTab').classList.add('hidden');
      document.getElementById('passedTab').classList.add('hidden');
      document.getElementById('rejectedTab').classList.add('hidden');
      
      if (tab === 'upload') {
        document.getElementById('uploadTab').classList.remove('hidden');
      } else if (tab === 'pending') {
        document.getElementById('pendingTab').classList.remove('hidden');
        loadImages(0);
      } else if (tab === 'passed') {
        document.getElementById('passedTab').classList.remove('hidden');
        loadImages(1);
      } else if (tab === 'rejected') {
        document.getElementById('rejectedTab').classList.remove('hidden');
        loadImages(2);
      }
    }
    
    function changeMonth(delta) {
      if (!currentYearMonth) {
        const now = new Date();
        currentYearMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
      }
      
      const [year, month] = currentYearMonth.split('-').map(Number);
      const date = new Date(year, month - 1 + delta, 1);
      currentYearMonth = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
      
      updateMonthSelector();
      
      // 重新加载当前标签页的图片
      const activeTab = document.querySelector('.tab.active');
      if (activeTab) {
        const tabName = activeTab.textContent;
        if (tabName === '待审核') loadImages(0);
        else if (tabName === '已通过') loadImages(1);
        else if (tabName === '已拒绝') loadImages(2);
      }
    }
    
    function updateMonthSelector() {
      const monthSelector = document.querySelector('.month-selector');
      const currentMonthEl = document.getElementById('currentMonth');
      
      if (currentYearMonth) {
        monthSelector.style.display = 'flex';
        monthSelector.style.justifyContent = 'center';
        monthSelector.style.alignItems = 'center';
        monthSelector.style.gap = '20px';
        
        const [year, month] = currentYearMonth.split('-');
        currentMonthEl.textContent = `${year}年${parseInt(month)}月`;
      } else {
        monthSelector.style.display = 'none';
      }
    }
    
    function setupDropZone() {
      const dropZone = document.getElementById('dropZone');
      const fileInput = document.getElementById('fileInput');
      
      dropZone.addEventListener('click', () => fileInput.click());
      
      dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
      });
      
      dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('dragover');
      });
      
      dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        handleFiles(e.dataTransfer.files);
      });
      
      fileInput.addEventListener('change', (e) => {
        handleFiles(e.target.files);
      });
    }
    
    function handleFiles(files) {
      const imageFiles = Array.from(files).filter(f => f.type.startsWith('image/'));
      selectedFiles = selectedFiles.concat(imageFiles);
      renderPreview();
    }
    
    function renderPreview() {
      const list = document.getElementById('previewList');
      const actions = document.getElementById('uploadActions');
      
      if (selectedFiles.length === 0) {
        list.innerHTML = '';
        actions.classList.add('hidden');
        return;
      }
      
      actions.classList.remove('hidden');
      list.innerHTML = selectedFiles.map((file, index) => `
        <div class="preview-item" id="preview-${index}">
          <img src="${URL.createObjectURL(file)}">
          <button class="remove" onclick="removeFile(${index})">×</button>
        </div>
      `).join('');
    }
    
    function removeFile(index) {
      selectedFiles.splice(index, 1);
      renderPreview();
    }
    
    function clearPreview() {
      selectedFiles = [];
      renderPreview();
    }
    
    function calculateMD5(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const spark = new SparkMD5.ArrayBuffer();
          spark.append(e.target.result);
          resolve(spark.end());
        };
        reader.onerror = reject;
        reader.readAsArrayBuffer(file);
      });
    }
    
    async function startUpload() {
      if (selectedFiles.length === 0) return;
      
      const btn = event.target;
      btn.disabled = true;
      btn.textContent = '上传中...';
      
      let successCount = 0;
      let duplicateCount = 0;
      let errorCount = 0;
      const errors = [];
      
      for (let i = 0; i < selectedFiles.length; i++) {
        const file = selectedFiles[i];
        const previewEl = document.getElementById(`preview-${i}`);
        
        try {
          previewEl.querySelector('.status')?.remove();
          previewEl.insertAdjacentHTML('beforeend', '<div class="status" style="background:#667eea">读取中...</div>');
          
          const md5 = await calculateMD5(file);
          
          previewEl.querySelector('.status')?.remove();
          previewEl.insertAdjacentHTML('beforeend', '<div class="status" style="background:#667eea">检查重复...</div>');
          
          const existRes = await db.collection('images')
            .where({ md5, status: db.command.in([0, 1]) })
            .count();
          
          if (existRes.total > 0) {
            duplicateCount++;
            previewEl.querySelector('.status')?.remove();
            previewEl.insertAdjacentHTML('beforeend', '<div class="status duplicate">重复</div>');
            continue;
          }
          
          previewEl.querySelector('.status')?.remove();
          previewEl.insertAdjacentHTML('beforeend', '<div class="status" style="background:#667eea">上传中...</div>');
          
          const now = new Date();
          const month = now.getMonth() + 1;
          const yearMonth = `${now.getFullYear()}-${String(month).padStart(2, '0')}`;
          const today = now.toISOString().split('T')[0];
          const ext = file.name.split('.').pop() || 'jpg';
          const cloudPath = `memes/${yearMonth}/${Date.now()}_${Math.random().toString(36).substr(2, 9)}.${ext}`;
          
          const uploadRes = await new Promise((resolve, reject) => {
            app.uploadFile({
              cloudPath,
              filePath: file,
              onUploadProgress: (progress) => {
                const percent = Math.round(progress.loaded / progress.total * 100);
                previewEl.querySelector('.status').textContent = `上传中 ${percent}%`;
              },
              success: (res) => resolve(res),
              fail: (err) => reject(err)
            });
          });
          
          console.log('上传结果:', uploadRes);
          
          previewEl.querySelector('.status')?.remove();
          previewEl.insertAdjacentHTML('beforeend', '<div class="status" style="background:#667eea">保存中...</div>');
          
          await db.collection('images').add({
            fileID: uploadRes.fileID,
            url: uploadRes.fileID,
            md5,
            uploaderOpenid: 'admin',
            status: 0,
            dislikeCount: 0,
            likeCount: 0,
            date: today,
            yearMonth,
            month,
            createTime: Date.now()
          });
          
          successCount++;
          previewEl.querySelector('.status')?.remove();
          previewEl.insertAdjacentHTML('beforeend', '<div class="status success">成功</div>');
          
        } catch (err) {
          console.error('上传失败', err);
          console.error('错误详情:', err.message, err.stack);
          errors.push(`${file.name}: ${err.message}`);
          errorCount++;
          previewEl.querySelector('.status')?.remove();
          previewEl.insertAdjacentHTML('beforeend', `<div class="status error" title="${err.message}">失败</div>`);
        }
      }
      
      btn.disabled = false;
      btn.textContent = '开始上传';
      
      let message = `上传完成\n成功: ${successCount}\n重复: ${duplicateCount}\n失败: ${errorCount}`;
      if (errors.length > 0 && errors.length <= 3) {
        message += '\n\n错误信息:\n' + errors.join('\n');
      }
      alert(message);
      
      selectedFiles = [];
      setTimeout(() => {
        renderPreview();
        loadStats();
      }, 1000);
    }
    
    init();
  </script>
</body>
</html>
